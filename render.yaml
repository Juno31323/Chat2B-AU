databases:
  - name: college-admissions-db
    databaseName: college_admissions_chatbot
    plan: free

services:
  - type: web
    name: college-admissions-chatbot
    env: java
    plan: free
    buildCommand: chmod +x ./gradlew && ./gradlew build
    startCommand: java -jar build/libs/college-admissions-chatbot-0.0.1-SNAPSHOT.jar
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: college-admissions-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: college-admissions-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: college-admissions-db
          property: password
      - key: DATABASE_DRIVER_CLASS_NAME
        value: org.postgresql.Driver
      - key: APP_TRUST_FORWARD_HEADERS
        value: "true"
      - key: APP_TRUSTED_PROXY_ADDRESSES
        value: "*"
      - key: APP_BOOTSTRAP_ON_STARTUP
        value: "true"
      - key: APP_BOOTSTRAP_IF_EMPTY_ONLY
        value: "true"
