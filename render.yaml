databases:
  - name: college-admissions-db
    databaseName: college_admissions_chatbot
    plan: free

services:
  - type: web
    name: college-admissions-chatbot
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: APP_ADMIN_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: college-admissions-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: college-admissions-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: college-admissions-db
          property: password
      - key: DATABASE_DRIVER_CLASS_NAME
        value: org.postgresql.Driver
      - key: APP_TRUST_FORWARD_HEADERS
        value: "true"
      - key: APP_TRUSTED_PROXY_ADDRESSES
        value: "*"
      - key: APP_BOOTSTRAP_ON_STARTUP
        value: "true"
      - key: APP_BOOTSTRAP_IF_EMPTY_ONLY
        value: "true"
