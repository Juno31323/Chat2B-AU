# Test profile: in-memory H2 only.
spring.datasource.url=jdbc:h2:mem:admissions_chatbot_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.sql.init.mode=always

app.bootstrap-on-startup=false
app.corpus-profile=text_only
app.index-version=text_only_v1_test
app.pgvector-enabled=false
app.pgvector-index-enabled=false

generation.provider=${GENERATION_PROVIDER:mock}
generation.model=${GENERATION_MODEL:demo-extractive}
generation.temperature=${GENERATION_TEMPERATURE:0.0}
generation.max-output-tokens=${GENERATION_MAX_OUTPUT_TOKENS:512}
generation.prompt-version=${GENERATION_PROMPT_VERSION:grounded_qa_v1}
generation.allow-mock-fallback=true
