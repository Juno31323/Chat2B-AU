# OCR-RAG plain-text experiment profile.
# Build data/processed/ocr_plain/corpus first with scripts/build_ocr_plain_corpus.py.

app.bootstrap-location=file:data/processed/ocr_plain/corpus/*.md
app.index-name=ocr_plain
app.corpus-profile=ocr_plain
app.index-version=ocr_plain_v1

app.embedding-dimensions=256
app.chunk-size=700
app.chunk-overlap=0
app.tokenizer=unicode-letter-number-v1

app.fusion-method=rrf
app.bm25-top-k=50
app.dense-top-k=50
app.hybrid-top-k=5
app.rrf-k=60

app.refusal-min-dense-score=0.22
app.refusal-min-token-overlap=1
app.refusal-min-token-coverage=0.30
app.refusal-evidence-top-k=40
