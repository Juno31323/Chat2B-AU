spring:
  datasource:
    url: ${DATABASE_URL:jdbc:h2:file:./.data/admissions_chatbot;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: ${DATABASE_DRIVER_CLASS_NAME:org.h2.Driver}
  sql:
    init:
      mode: always

app:
  corpus-profile: ${APP_CORPUS_PROFILE:text_only}
  index-name: ${APP_INDEX_NAME:text_only}
  index-version: ${APP_INDEX_VERSION:text_only_v1_local}
  pgvector-enabled: false
  pgvector-index-enabled: false

generation:
  provider: ${GENERATION_PROVIDER:openai}
  model: ${GENERATION_MODEL:gpt-5-mini}
  important-model: ${GENERATION_IMPORTANT_MODEL:gpt-5}
  temperature: ${GENERATION_TEMPERATURE:0.0}
  max-output-tokens: ${GENERATION_MAX_OUTPUT_TOKENS:512}
  prompt-version: ${GENERATION_PROMPT_VERSION:grounded_qa_v1}
  allow-mock-fallback: ${GENERATION_ALLOW_MOCK_FALLBACK:true}

openai:
  api-key: ${OPENAI_API_KEY:}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
