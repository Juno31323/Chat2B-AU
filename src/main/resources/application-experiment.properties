# Paper experiment profile: use PostgreSQL/Supabase and pgvector.
# Provide DB values through environment variables. Do not hardcode secrets.
spring.datasource.url=${SUPABASE_DB_URL:${DATABASE_URL:}}
spring.datasource.username=${SUPABASE_DB_USER:${DATABASE_USERNAME:}}
spring.datasource.password=${SUPABASE_DB_PASSWORD:${DATABASE_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

# Paper experiments use the canonical PostgreSQL schema in
# src/main/resources/db/migration/postgres/V1__create_rag_experiment_schema.sql.
# Do not run the H2-oriented schema.sql against Supabase/PostgreSQL.
spring.sql.init.mode=never

app.corpus-profile=${APP_CORPUS_PROFILE:text_only}
app.index-name=${APP_INDEX_NAME:text_only}
app.index-version=${APP_INDEX_VERSION:text_only_v1_experiment}
app.pgvector-enabled=true
app.pgvector-index-enabled=true
app.fusion-method=${APP_FUSION_METHOD:rrf}
app.hybrid-top-k=${APP_HYBRID_TOP_K:5}
app.bm25-top-k=${APP_BM25_TOP_K:50}
app.dense-top-k=${APP_DENSE_TOP_K:50}
app.rrf-k=${APP_RRF_K:60}
app.refusal-min-dense-score=${APP_REFUSAL_MIN_DENSE_SCORE:0.22}
app.refusal-min-token-overlap=${APP_REFUSAL_MIN_TOKEN_OVERLAP:1}
app.refusal-min-token-coverage=${APP_REFUSAL_MIN_TOKEN_COVERAGE:0.30}
app.refusal-evidence-top-k=${APP_REFUSAL_EVIDENCE_TOP_K:40}
app.refusal-out-of-domain-cues=${APP_REFUSAL_OUT_OF_DOMAIN_CUES:날씨,학번,삼성전자,주가,2030학년도,존재하지,개인 연락처}
app.bootstrap-if-empty-only=${APP_BOOTSTRAP_IF_EMPTY_ONLY:true}
app.force-reindex=${APP_FORCE_REINDEX:false}

generation.provider=${GENERATION_PROVIDER:openai}
generation.model=${GENERATION_MODEL:gpt-5-mini}
generation.important-model=${GENERATION_IMPORTANT_MODEL:gpt-5}
generation.temperature=${GENERATION_TEMPERATURE:0.0}
generation.max-output-tokens=${GENERATION_MAX_OUTPUT_TOKENS:512}
generation.prompt-version=${GENERATION_PROMPT_VERSION:grounded_qa_v1}
generation.allow-mock-fallback=${GENERATION_ALLOW_MOCK_FALLBACK:false}
generation.input-cost-per-million-tokens-usd=${GENERATION_INPUT_COST_PER_MILLION_TOKENS_USD:0.25}
generation.output-cost-per-million-tokens-usd=${GENERATION_OUTPUT_COST_PER_MILLION_TOKENS_USD:2.00}
generation.important-input-cost-per-million-tokens-usd=${GENERATION_IMPORTANT_INPUT_COST_PER_MILLION_TOKENS_USD:1.25}
generation.important-output-cost-per-million-tokens-usd=${GENERATION_IMPORTANT_OUTPUT_COST_PER_MILLION_TOKENS_USD:10.00}

openai.api-key=${OPENAI_API_KEY:}
openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
