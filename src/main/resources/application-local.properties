# Local developer profile: keep H2 isolated from paper experiment runs.
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./.data/admissions_chatbot;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.sql.init.mode=always

app.corpus-profile=${APP_CORPUS_PROFILE:text_only}
app.index-version=${APP_INDEX_VERSION:text_only_v1_local}
app.pgvector-enabled=false
app.pgvector-index-enabled=false

generation.provider=${GENERATION_PROVIDER:openai}
generation.model=${GENERATION_MODEL:gpt-5-mini}
generation.important-model=${GENERATION_IMPORTANT_MODEL:gpt-5}
generation.temperature=${GENERATION_TEMPERATURE:0.0}
generation.max-output-tokens=${GENERATION_MAX_OUTPUT_TOKENS:512}
generation.prompt-version=${GENERATION_PROMPT_VERSION:grounded_qa_v1}
generation.allow-mock-fallback=${GENERATION_ALLOW_MOCK_FALLBACK:true}

openai.api-key=${OPENAI_API_KEY:}
openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
