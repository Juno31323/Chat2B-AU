<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>안산대학교 입학 FAQ 챗봇 MVP</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Ansan University Admissions</p>
      <h1>안산대학교 입학 FAQ 챗봇</h1>
      <p class="subtitle">
        안산대학교 공식 모집요강과 입학 관련 공개 자료를 바탕으로 수시 일정, 면접 준비물,
        장학금, 기숙사 질문에 답하는 1차 MVP입니다.
      </p>
      <div class="chips">
        <button class="chip" data-question="수시 1차 원서접수 기간이 언제야?">수시 1차 일정</button>
        <button class="chip" data-question="간호학과는 몇 년제야?">간호학과</button>
        <button class="chip" data-question="면접 준비물은 뭐가 필요해?">면접 준비물</button>
        <button class="chip" data-question="신입생 장학금에는 어떤 게 있어?">장학금</button>
      </div>
    </section>

    <section class="chat-panel">
      <div class="panel-head">
        <div>
          <h2>챗봇 데모</h2>
          <p>공식 문서를 기반으로 답하고, 근거 출처를 함께 보여줍니다.</p>
        </div>
        <span id="mode-badge" class="mode-badge">loading</span>
      </div>

      <div id="messages" class="messages">
        <article class="message assistant">
          <p>안녕하세요. 안산대학교 입학 FAQ 챗봇입니다. 궁금한 내용을 입력하면 모집요강 기준으로 바로 안내해드릴게요.</p>
        </article>
      </div>

      <form id="chat-form" class="composer">
        <textarea id="question" name="question" rows="3" placeholder="예: 수시 1차 원서접수는 언제까지야?" required></textarea>
        <div class="composer-footer">
          <p class="hint">문서에 없는 내용은 추측하지 않고 입학처 문의를 안내합니다.</p>
          <button type="submit">질문하기</button>
        </div>
      </form>
    </section>
  </main>

  <template id="source-template">
    <li class="source-item">
      <button type="button" class="source-chip" aria-expanded="false">
        <span class="source-chip-dot" aria-hidden="true"></span>
        <span>근거</span>
      </button>
      <div class="source-tooltip" role="note">
        <strong class="source-label"></strong>
        <p class="source-snippet"></p>
      </div>
    </li>
  </template>

  <script src="/app.js"></script>
</body>
</html>
