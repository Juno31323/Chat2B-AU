# Demo/production profile: use PostgreSQL/Supabase and pgvector when available.
spring.datasource.url=${SUPABASE_DB_URL:${DATABASE_URL:}}
spring.datasource.username=${SUPABASE_DB_USER:${DATABASE_USERNAME:}}
spring.datasource.password=${SUPABASE_DB_PASSWORD:${DATABASE_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.sql.init.mode=always

app.pgvector-enabled=true
app.pgvector-index-enabled=true
app.bootstrap-if-empty-only=${APP_BOOTSTRAP_IF_EMPTY_ONLY:true}
